<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>ADPL · Point & Rank Journey</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300..800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { background-image: url('bg.png'); background-size: cover; background-attachment: fixed; }
    .journey-controls {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .player-select {
      background: var(--surface-glass);
      border: 1px solid var(--border-light);
      color: var(--text-primary);
      padding: 0.8rem 1.5rem;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 600;
      backdrop-filter: blur(8px);
      min-width: 250px;
    }
    .chart-box {
      background: var(--surface-glass);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 1.5rem;
      border: 1px solid var(--border-light);
      margin-bottom: 2rem;
    }
    canvas { max-height: 400px; width: 100% !important; }
    .toggle-buttons {
      display: flex;
      gap: 1rem;
      margin: 1rem 0;
    }
    .toggle-btn {
      background: var(--surface-glass);
      border: 1px solid var(--border-light);
      color: var(--text-primary);
      padding: 0.5rem 1.5rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }
    .toggle-btn.active {
      background: var(--accent-primary);
      color: var(--bg-primary);
      border-color: var(--accent-primary);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo"><span class="logo-icon">🏏</span> ADPL·2026</div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">🏠 Leaderboard</a>
      <a href="pp.html" class="nav-link">👤 Player Profiles</a>
      <a href="pw.html" class="nav-link">🏆 Previous Winners</a>
      <a href="stats.html" class="nav-link">📊 Stats</a>
      <a href="journey.html" class="nav-link active">📈 Journey</a>
      <a href="more.html" class="nav-link">📖 More</a>
      <a href="rules.html" class="nav-link">📜 Rules</a>
      <select id="themeSelector" class="theme-selector">
        <option value="green-silver">🌿 Green-Silver</option>
        <option value="red-gold">🔥 Red-Gold</option>
        <option value="blue-black">💙 Blue-Black</option>
        <option value="csk">🟡💙 CSK</option>
        <option value="mi">🔵🟡 MI</option>
        <option value="rcb">🔴⚫ RCB</option>
        <option value="kkr">🟣🟡 KKR</option>
        <option value="dc">🔵🔴 DC</option>
        <option value="pbks">🔴⚪ PBKS</option>
        <option value="rr">🩷🔵 RR</option>
        <option value="srh">🟠⚫ SRH</option>
        <option value="lsg">🔵🔴 LSG</option>
        <option value="gt">🔵⚪ GT</option>
      </select>
    </div>
  </nav>

  <main class="main-container">
    <h1 class="section-title" style="text-align:center;">📈 Player Journey</h1>
    <div class="journey-controls">
      <label for="playerSelect" style="font-weight:600;">Select Player:</label>
      <select id="playerSelect" class="player-select"></select>
    </div>

    <div class="toggle-buttons">
      <button id="showPointsBtn" class="toggle-btn active">📊 Points Journey</button>
      <button id="showRankBtn" class="toggle-btn">🏅 Rank Journey</button>
    </div>
    
    <div class="chart-box" id="pointsChartContainer">
      <canvas id="journeyChart"></canvas>
    </div>
    <div class="chart-box" id="rankChartContainer" style="display:none;">
      <canvas id="rankChart"></canvas>
    </div>
    <div class="info-note">📌 Season points will be added at end of the season.</div>
  </main>

  <footer class="footer">
    <div class="footer-content"><span>⚡ Official Partner:</span><a href="https://chat.whatsapp.com/GcFsctnWN2iB9OV8GofVut?mode=gi_t" target="_blank" class="footer-link"><img src="footer.png" alt="Join ADPL Community"></a></div>
    <div class="footer-copyright">© ADPL 2026</div>
  </footer>

  <script src="script.js"></script>
  <script>
    (function() {
      const sheet = "14C6hEU0LomlnzIKXzy7DqvfgsAQF0vmNNnDi3BovUOk";
      const pointsURL = `https://opensheet.elk.sh/${sheet}/points`;
      const matchURL = `https://opensheet.elk.sh/${sheet}/matches`;
      const seasonURL = `https://opensheet.elk.sh/${sheet}/season`;

      let allPlayers = [];
      let matchData = [];
      let seasonData = [];
      let pointsData = [];
      let pointsChart = null, rankChart = null;

      const playerSelect = document.getElementById('playerSelect');
      const ctxPoints = document.getElementById('journeyChart').getContext('2d');
      const ctxRank = document.getElementById('rankChart').getContext('2d');
      
      const showPointsBtn = document.getElementById('showPointsBtn');
      const showRankBtn = document.getElementById('showRankBtn');
      const pointsContainer = document.getElementById('pointsChartContainer');
      const rankContainer = document.getElementById('rankChartContainer');

      showPointsBtn.addEventListener('click', () => {
        pointsContainer.style.display = 'block';
        rankContainer.style.display = 'none';
        showPointsBtn.classList.add('active');
        showRankBtn.classList.remove('active');
      });
      showRankBtn.addEventListener('click', () => {
        pointsContainer.style.display = 'none';
        rankContainer.style.display = 'block';
        showRankBtn.classList.add('active');
        showPointsBtn.classList.remove('active');
      });

      // Enhanced match ordering: league matches 1-70, then playoffs
      function getMatchOrder(matchStr) {
        if (!matchStr) return 9999;
        const str = String(matchStr).trim();
        
        // Playoff specials (order: Q1, Eliminator, Q2, Final)
        if (str.includes('Qualifier 1') || str.includes('Qualifier1') || str === 'Q1') return 71;
        if (str.includes('Eliminator') || str.includes('Eliminator') || str === 'E') return 72;
        if (str.includes('Qualifier 2') || str.includes('Qualifier2') || str === 'Q2') return 73;
        if (str.includes('Final') || str === 'F') return 74;
        
        // League match: "Match 1", "Match 42", "M1", etc.
        const leagueMatch = str.match(/(?:Match|M)\s*(\d+)/i);
        if (leagueMatch) {
          const num = parseInt(leagueMatch[1]);
          if (num >= 1 && num <= 70) return num;
        }
        
        // Try to extract any number (e.g., "1", "Match 01")
        const numOnly = str.match(/^\d+$/);
        if (numOnly) {
          const num = parseInt(numOnly[0]);
          if (num >= 1 && num <= 70) return num;
        }
        
        // Fallback: extract any number and add 1000 to push unknown to end
        const num = str.match(/\d+/);
        return num ? 1000 + parseInt(num[0]) : 9999;
      }

      // Sort matches chronologically and return sorted array
      function getSortedMatches() {
        const allMatches = [...new Set(matchData.map(m => m.Match).filter(m => m))];
        const sorted = allMatches.sort((a, b) => getMatchOrder(a) - getMatchOrder(b));
        console.log('📋 Sorted match order:', sorted);
        return sorted;
      }

      async function init() {
        try {
          const [pts, matches, season] = await Promise.all([
            fetch(pointsURL).then(r => r.json()),
            fetch(matchURL).then(r => r.json()),
            fetch(seasonURL).then(r => r.json())
          ]);
          pointsData = pts;
          matchData = matches;
          seasonData = season;
          
          allPlayers = [...new Set(pointsData.map(p => p.Player))].sort();
          populateDropdown();
          
          playerSelect.addEventListener('change', (e) => {
            if (e.target.value) {
              renderJourney(e.target.value);
              renderRankJourney(e.target.value);
            }
          });
          
          if (allPlayers.length) {
            playerSelect.value = allPlayers[0];
            renderJourney(allPlayers[0]);
            renderRankJourney(allPlayers[0]);
          }
        } catch(e) {
          console.error(e);
          document.querySelector('.chart-box').innerHTML = '<p class="loader">Error loading journey data</p>';
        }
      }

      function populateDropdown() {
        playerSelect.innerHTML = '<option value="">-- Choose a player --</option>';
        allPlayers.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p;
          opt.textContent = p;
          playerSelect.appendChild(opt);
        });
      }

      // Points journey (sorted chronologically)
      function computeCumulativePoints(player) {
        const playerSeason = seasonData.find(s => s.Player === player);
        const seasonPts = playerSeason ? Number(playerSeason.SeasonPoints) || 0 : 0;
        const sortedMatches = getSortedMatches();
        const playerMatches = matchData.filter(m => m.Player === player);
        
        let cumulative = seasonPts;
        const labels = ['Season'];
        const dataPoints = [seasonPts];
        
        sortedMatches.forEach(mId => {
          const match = playerMatches.find(m => m.Match === mId);
          if (match) {
            const winnerPts = Number(match.WinnerPoints) || 0;
            const motmPts = Number(match.MOTMPoints) || 0;
            cumulative += winnerPts + motmPts;
          }
          labels.push(mId);
          dataPoints.push(cumulative);
        });
        return { labels, dataPoints };
      }

      // Rank journey (sorted chronologically)
      function computeRankTimeline(selectedPlayer) {
        const playerList = allPlayers;
        const sortedMatches = getSortedMatches();
        const stages = ['Season', ...sortedMatches];
        
        // Precompute cumulative scores for every player at each stage
        const scoresOverTime = {};
        playerList.forEach(p => {
          const playerSeason = seasonData.find(s => s.Player === p);
          const base = playerSeason ? Number(playerSeason.SeasonPoints) || 0 : 0;
          const playerMatches = matchData.filter(m => m.Player === p);
          let cum = base;
          const timeline = [base];
          
          sortedMatches.forEach(mId => {
            const match = playerMatches.find(m => m.Match === mId);
            if (match) {
              cum += (Number(match.WinnerPoints)||0) + (Number(match.MOTMPoints)||0);
            }
            timeline.push(cum);
          });
          scoresOverTime[p] = timeline;
        });

        // For each stage, compute ranks (1 = highest score)
        const rankTimeline = [];
        for (let stageIdx = 0; stageIdx < stages.length; stageIdx++) {
          const stageScores = playerList.map(p => ({ player: p, score: scoresOverTime[p][stageIdx] }));
          stageScores.sort((a,b) => b.score - a.score);
          const rankMap = {};
          stageScores.forEach((item, idx) => { rankMap[item.player] = idx + 1; });
          rankTimeline.push(rankMap);
        }
        
        const selectedRanks = rankTimeline.map(stage => stage[selectedPlayer] || 0);
        return { labels: stages, ranks: selectedRanks };
      }

      function renderJourney(player) {
        const { labels, dataPoints } = computeCumulativePoints(player);
        if (pointsChart) pointsChart.destroy();
        pointsChart = new Chart(ctxPoints, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: `${player} · Total Points`,
              data: dataPoints,
              borderColor: 'var(--accent-primary)',
              backgroundColor: 'rgba(192,192,192,0.1)',
              borderWidth: 3,
              pointBackgroundColor: 'var(--accent-secondary)',
              pointBorderColor: '#fff',
              pointRadius: 5,
              tension: 0.2,
              fill: true
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { labels: { color: 'var(--text-primary)' } },
              tooltip: { mode: 'index' }
            },
            scales: {
              y: { 
                beginAtZero: true, 
                grid: { color: 'var(--border-soft)' },
                ticks: { color: 'var(--text-secondary)' },
                title: { display: true, text: 'Cumulative Points', color: 'var(--accent-secondary)' }
              },
              x: { ticks: { color: 'var(--text-primary)' } }
            }
          }
        });
      }

      function renderRankJourney(player) {
        const { labels, ranks } = computeRankTimeline(player);
        if (rankChart) rankChart.destroy();
        rankChart = new Chart(ctxRank, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: `${player} · Rank (lower is better)`,
              data: ranks,
              borderColor: 'var(--accent-primary)',
              backgroundColor: 'rgba(192,192,192,0.05)',
              borderWidth: 3,
              pointBackgroundColor: 'var(--accent-secondary)',
              pointBorderColor: '#fff',
              pointRadius: 5,
              tension: 0.2,
              fill: false
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { labels: { color: 'var(--text-primary)' } },
              tooltip: { mode: 'index' }
            },
            scales: {
              y: { 
                reverse: true,
                grid: { color: 'var(--border-soft)' },
                ticks: { color: 'var(--text-secondary)', stepSize: 1 },
                title: { display: true, text: 'Rank', color: 'var(--accent-secondary)' }
              },
              x: { ticks: { color: 'var(--text-primary)' } }
            }
          }
        });
      }

      init();
    })();
  </script>
</body>
</html>
